name: 🔧 QUAST SaltStack CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # JOB 1: SYNTAX VALIDATION
  # ============================================================
  validate:
    name: ✅ Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml jinja2
      
      - name: Check YAML
        run: |
          for file in $(find srv -name "*.sls" 2>/dev/null); do
            python3 -c "import yaml; yaml.safe_load(open('$file'))" && echo "✅ $file"
          done
      
      - name: Check Jinja2
        run: |
          for file in $(find srv -name "*.j2" 2>/dev/null); do
            python3 -c "from jinja2 import Template; Template(open('$file').read())" && echo "✅ $file"
          done

  # ============================================================
  # JOB 2: PILLAR TEST
  # ============================================================
  pillar:
    name: 📊 Pillar Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Salt
        run: |
          sudo apt-get update
          sudo apt-get install -y salt-master salt-minion
      
      - name: Test pillar
        run: |
          sudo mkdir -p /srv/pillar
          sudo cp -r srv/pillar/* /srv/pillar/
          sudo salt-call --local pillar.items > /dev/null
          echo "✅ Pillar compiles"

  # ============================================================
  # JOB 3: DRY-RUN (No actual changes!)
  # ============================================================
  dryrun:
    name: 🧪 DRY-RUN Test
    runs-on: ubuntu-latest
    needs: pillar
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Salt
        run: |
          sudo apt-get update
          sudo apt-get install -y salt-master salt-minion
      
      - name: Setup Salt
        run: |
          sudo mkdir -p /srv/salt /srv/pillar
          sudo cp -r srv/salt/* /srv/salt/
          sudo cp -r srv/pillar/* /srv/pillar/
      
      - name: Create mock minion
        run: |
          sudo mkdir -p /etc/salt
          echo "id: test-minion" | sudo tee /etc/salt/minion
      
      - name: DRY-RUN - Core VLANs
        run: |
          echo "=== DRY-RUN: Core VLANs ==="
          sudo salt-call --local state.apply quast.network.core.vlans test=true
          echo "✅ Dry-run completed - NO changes made"
      
      - name: DRY-RUN Complete
        run: |
          echo "=========================================="
          echo "✅ DRY-RUN PASSED"
          echo "No actual changes were made to any device"
          echo "=========================================="

  # ============================================================
  # JOB 4: SECURITY
  # ============================================================
  security:
    name: 🔒 Security
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for secrets
        run: |
          if grep -r "password.*=" srv/salt/ --include="*.sls" 2>/dev/null | grep -v "pillar"; then
            echo "⚠️ Hardcoded password found"
          else
            echo "✅ No hardcoded secrets"
          fi

  # ============================================================
  # JOB 5: FINAL STATUS
  # ============================================================
  status:
    name: 📋 Status
    runs-on: ubuntu-latest
    needs: [validate, pillar, dryrun, security]
    if: always()
    steps:
      - run: |
          echo "=========================================="
          echo "CI/CD RESULTS"
          echo "=========================================="
          echo "Validate: ${{ needs.validate.result }}"
          echo "Pillar:   ${{ needs.pillar.result }}"
          echo "Dry-Run:  ${{ needs.dryrun.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "=========================================="
          
          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed"
          fi
