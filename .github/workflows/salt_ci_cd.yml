name: 🧂 Salt Syntax Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-syntax:
    name: ✅ Validate YAML & Jinja2 Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml jinja2

      - name: Check YAML syntax
        run: |
          echo "🔍 Scanning .sls files..."
          for file in $(find srv -name "*.sls" -type f 2>/dev/null); do
            python3 -c "import yaml; yaml.safe_load(open('$file'))" && echo "✅ $file" || exit 1
          done

      - name: Check Jinja2 syntax
        run: |
          echo "🔍 Scanning .j2 files..."
          for file in $(find srv -name "*.j2" -type f 2>/dev/null); do
            python3 -c "from jinja2 import Template; Template(open('$file').read())" && echo "✅ $file" || exit 1
          done

      - name: Success
        run: echo "✅ All syntax checks passed!"
